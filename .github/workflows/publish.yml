name: Deploy extension

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install

  build:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build

  publish-vsce:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-vsce
        with:
          vsce_token: ${{ secrets.VSCE_TOKEN }}

  publish-openvsx:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-openvsx
        with:
          open_vsx_token: ${{ secrets.OPENVSX_TOKEN }}